name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2

      - name: Install protobuf compiler and mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold

      - name: Run tests
        run: cargo test --verbose

  clippy:
    name: Clippy (Linting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install protobuf compiler and mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2

      - name: Install protobuf compiler and mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold

      - name: Build (debug)
        run: cargo build --verbose

      - name: Build (release)
        run: cargo build --release --verbose

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2

      - name: Install protobuf compiler and mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold

      - name: Check for hardcoded credentials
        run: |
          found=0
          while IFS= read -r file; do
            case "$file" in
              */test_support.rs|*/test_helpers.rs|*/test_utils.rs|*/test_fixtures.rs) continue ;;
            esac
            prod=$(awk '
              /^[[:space:]]*#\[cfg\(test\)\][[:space:]]*$/ {intest=1}
              /^[[:space:]]*mod tests[[:space:]]*\{?[[:space:]]*$/ {intest=1}
              intest==0 {print}
            ' "$file")
            # Epic C C-0 (2026-05-21) precision tightening: previously
            # the chain `grep -E 'password|...' | grep -v <exclusions>
            # | grep -E '(=\s*..)'` matched any line containing the
            # keyword anywhere PLUS an assignment-shaped fragment
            # elsewhere — false-positive on audit event names like
            # `event = "setup_password_rejected"`, response fields like
            # `error: "password_validation_failed"`, and URL paths like
            # `path() == "/api/setup/password"`. The new single
            # regex requires the keyword to be IMMEDIATELY before the
            # assignment operator, which is what an actual hardcoded
            # credential looks like. `\b` word boundary stops false
            # matches like `chirpstack_metric_name = "foo_token"`.
            hits=$(echo "$prod" \
              | grep -E '\b(password|secret|api_key|token)[[:space:]]*[=:][[:space:]]*('"'"'|")' \
              | grep -v 'doc\|unwrap\|parse\|REPLACE_ME\|to_string\|leaked\|assert\|///\|"{' \
              || true)
            if [ -n "$hits" ]; then
              echo "=== $file ==="
              echo "$hits"
              found=1
            fi
          done < <(find src -name "*.rs" -type f)
          if [ "$found" -eq 1 ]; then
            echo "⚠️  Potential hardcoded credentials found in source code"
            exit 1
          fi
          echo "✓ No obvious hardcoded credentials detected"

      - name: Verify SPDX headers
        run: |
          missing_headers=0
          while IFS= read -r file; do
            if ! head -1 "$file" | grep -q "SPDX-License-Identifier"; then
              echo "Missing SPDX header: $file"
              ((missing_headers++))
            fi
          done < <(find src -name "*.rs" -type f)
          if [ $missing_headers -gt 0 ]; then
            echo "❌ $missing_headers file(s) missing SPDX headers"
            exit 1
          fi
          echo "✓ All source files have SPDX headers"

      - name: Check for unsafe blocks
        run: |
          unsafe_count=$(grep -r "unsafe" src/ --include="*.rs" | grep -v "test\|doc" | wc -l)
          if [ $unsafe_count -gt 0 ]; then
            echo "⚠️  Found $unsafe_count unsafe block(s) - verify they are documented"
            grep -r "unsafe" src/ --include="*.rs" | grep -v "test\|doc"
          fi
