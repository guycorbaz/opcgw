name: Docker Build

on:
  push:
    tags:
      - 'v*'

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE_NAME: gcorbaz/opcgw

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        # QEMU is required for cross-architecture emulation when building
        # the linux/arm64 leg on a linux/amd64 GitHub-hosted runner.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub Actions does NOT allow the `secrets` context in step-level
      # `if:` expressions (the available contexts are env, github, inputs,
      # job, matrix, needs, runner, steps, strategy, vars — actionlint
      # rejects workflows that violate this rule, which is why iter-2's
      # original U1 patch made every docker-build run fail in 0 s with
      # "This run likely failed because of a workflow file issue.").
      # Indirection: detect secret presence in a `run:` step (which IS
      # allowed to reference `secrets`), export the result as a step
      # output, and gate the downstream steps on `steps.check-dockerhub.outputs.have_creds`.
      # The secrets are piped through `env:` rather than interpolated
      # directly into the shell to defuse any shell-metacharacter
      # injection from a hostile secret value.
      - name: Detect Docker Hub credentials
        id: check-dockerhub
        env:
          DH_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -n "$DH_USERNAME" && -n "$DH_TOKEN" ]]; then
            echo "have_creds=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub credentials present — both pushes will fire."
          else
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub credentials missing — GHCR-only fallback engaged."
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        # Skipped (without failing the workflow) if the Docker Hub secrets are
        # not set on the repo. This preserves the GHCR-only fallback so a
        # missing/rotated Docker Hub token cannot block a release.
        if: steps.check-dockerhub.outputs.have_creds == 'true'
        uses: docker/login-action@v3
        with:
          # Note: secrets.DOCKERHUB_USERNAME = "gcorbaz" (not "guycorbaz" - Docker Hub username differs from GitHub username).
          # secrets.DOCKERHUB_TOKEN is a Personal Access Token with Read/Write/Delete scope generated at
          # hub.docker.com -> Account Settings -> Security -> Personal Access Tokens.
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # iter-2 U1: registries are extracted + pushed independently so a missing
      # Docker Hub credential set cannot fail the GHCR leg of the release.
      # Each registry has its own metadata-action + build-push step, gated on
      # the secrets that registry's push step needs.

      - name: Extract GHCR metadata
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Extract Docker Hub metadata
        id: meta-hub
        if: steps.check-dockerhub.outputs.have_creds == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Build and push to GHCR
        # docker/build-push-action pinned at @v5 deliberately; @v6 has not been
        # validated against this workflow's multi-arch (amd64 + arm64) manifest
        # shape on a real `v*` tag push. Bump tracked as a v2.x follow-up.
        uses: docker/build-push-action@v5
        with:
          context: .
          # Multi-architecture manifest covering x86_64 servers + Raspberry-Pi-class arm64 edge gateways.
          # linux/arm/v7 (32-bit ARM) is deliberately out of scope for v2.0.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: |
            RUST_VERSION=1.94.0
            APP_NAME=opcgw

      - name: Build and push to Docker Hub
        # Gated on Docker Hub secrets being present so a missing/rotated PAT
        # cannot fail the workflow after GHCR has already been published.
        if: steps.check-dockerhub.outputs.have_creds == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-hub.outputs.tags }}
          labels: ${{ steps.meta-hub.outputs.labels }}
          build-args: |
            RUST_VERSION=1.94.0
            APP_NAME=opcgw

      - name: Sync Docker Hub repository description
        # D1 (Story B-1 Dev Notes): auto-sync hub.docker.com Overview page from docs/dockerhub-description.md.
        # Keeps the live Docker Hub page version-controlled in git and updated on every v* tag push.
        # Gated on Docker Hub secrets being set; `continue-on-error` so a flaky
        # third-party action or rate-limit cannot fail an otherwise-green release
        # (the image is already pushed by the prior build-push step).
        # short-description is capped at 100 chars by Docker Hub's API.
        if: steps.check-dockerhub.outputs.have_creds == 'true'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE_NAME }}
          readme-filepath: ./docs/dockerhub-description.md
          short-description: "ChirpStack to OPC UA gateway. Multi-arch amd64/arm64, non-root, industrial LoRaWAN."
