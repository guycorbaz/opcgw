<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>opcgw — Applications</title>
<link rel="stylesheet" href="/dashboard.css">
<style>
  /* Story 9-4 minimal-footprint overrides on top of dashboard.css. */
  .crud-form { display: grid; gap: 0.5rem; max-width: 400px; margin: 1rem 0; }
  .crud-form label { font-weight: bold; }
  .crud-form input, .crud-form select { padding: 0.4rem; font-size: 1rem; }
  .crud-form button { padding: 0.5rem; cursor: pointer; }
  table.applications { width: 100%; border-collapse: collapse; }
  table.applications th, table.applications td {
    padding: 0.5rem; border-bottom: 1px solid #ccc; text-align: left;
  }
  .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .btn-edit, .btn-delete { padding: 0.3rem 0.6rem; cursor: pointer; }
  .btn-delete { color: #fff; background: #c0392b; border: none; }
  .btn-edit { background: #2980b9; color: #fff; border: none; }
  .error-banner { color: #c0392b; padding: 0.5rem; }
  /* Story C-2 picker UI. */
  .picker-toolbar { display: flex; gap: 0.6rem; align-items: center; font-size: 0.85rem; }
  .picker-toolbar a { cursor: pointer; color: #2980b9; text-decoration: underline; }
  .picker-toolbar button { padding: 0.2rem 0.4rem; cursor: pointer; font-size: 0.85rem; }
  .picker-fallback-banner { background: #fcf3cf; color: #7d6608; padding: 0.5rem; margin: 0.4rem 0; border-left: 4px solid #f1c40f; }
  @media (max-width: 600px) {
    table.applications, table.applications thead, table.applications tbody,
    table.applications tr, table.applications th, table.applications td {
      display: block;
    }
    table.applications tr { margin-bottom: 0.8rem; border: 1px solid #ddd; padding: 0.4rem; }
    .actions { flex-direction: column; }
  }
</style>
</head>
<body>
<header>
  <h1>opcgw — Applications</h1>
  <nav><a href="/index.html">Dashboard</a> | <strong>Applications</strong> | <a href="/devices-config.html">Devices configuration</a> | <a href="/metrics.html">Live Metrics</a> | <a href="/commands.html">Commands</a> | <a href="/inventory-drift.html">Inventory drift</a> | <a href="/singleton-config.html">Singleton config</a></nav>
</header>

<main>
  <section>
    <h2>Create application</h2>
    <!-- Story C-2: inventory-picker CTA scroll-focuses the create form.
         The form below now offers either a name-driven picker fed by
         /api/inventory/applications (the default) or the legacy
         free-form manual-entry input as a fallback (per AC#1 / #2). -->
    <button type="button" id="add-application-cta"
            onclick="document.getElementById('create-form').scrollIntoView({ behavior: 'smooth', block: 'center' });">
      + Add application
    </button>
    <form id="create-form" class="crud-form" action="/api/applications" method="POST">
      <label for="new-application-id">Application</label>
      <!-- Story C-2 AC#1 / #2: picker + manual fallback. Exactly ONE
           of `application-picker-wrap` and `application-manual-wrap`
           is visible at a time; the toggle link below switches between
           them and persists the choice via localStorage. -->
      <div id="application-picker-wrap">
        <div class="picker-toolbar">
          <label class="sr-only" for="application-picker">Application from ChirpStack</label>
          <select id="application-picker" disabled aria-label="Application from ChirpStack">
            <!-- Story C-2 iter-1 review HIGH-7: explicit value="" so a
                 form-submit during initial Loading state never posts
                 the literal string "Loading…" as application_id. -->
            <option value="">Loading…</option>
          </select>
          <button type="button" id="application-picker-refresh" title="Refresh from ChirpStack (cache bypass)">↻</button>
          <a id="application-mode-to-manual" role="button" tabindex="0">Switch to manual entry</a>
        </div>
        <div id="application-picker-banner" class="picker-fallback-banner" hidden></div>
      </div>
      <div id="application-manual-wrap" hidden>
        <div class="picker-toolbar">
          <a id="application-mode-to-picker" role="button" tabindex="0">Switch to picker</a>
        </div>
        <input id="new-application-id" name="application_id" type="text" placeholder="Application ID (UUID)" autocomplete="off">
      </div>
      <label for="new-application-name">Application Name</label>
      <input id="new-application-name" name="application_name" type="text" required>
      <button type="submit">Create</button>
    </form>
    <div id="create-error" class="error-banner" hidden></div>
  </section>

  <section>
    <h2>Applications</h2>
    <div id="list-error" class="error-banner" hidden></div>
    <table class="applications" id="applications-table">
      <thead>
        <tr>
          <th>Application ID</th>
          <th>Application Name</th>
          <th>Devices</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="applications-tbody">
      </tbody>
    </table>
  </section>
</main>

<script src="/inventory-picker.js"></script>
<script src="/applications.js"></script>
<script src="/apply-bar.js"></script>
</body>
</html>
