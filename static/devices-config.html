<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="0; url=/config.html">
<title>opcgw — Configuration</title>
<script>
  // Story G-0: the standalone Devices-configuration page was retired in favour
  // of the unified drill-down at /config.html. Preserve drift-view deep-link
  // query params and, when a target application is given, deep-link straight to
  // that application's device view (#/app/<id>).
  (function () {
    var search = window.location.search || '';
    var appId = '';
    try { appId = new URLSearchParams(search).get('prefill_app_id') || ''; } catch (e) {}
    var hash = appId ? '#/app/' + encodeURIComponent(appId) : '';
    window.location.replace('/config.html' + search + hash);
  })();
</script>
</head>
<body>
<p>Redirecting to <a href="/config.html">Configuration</a>&hellip;</p>
</body>
</html>
