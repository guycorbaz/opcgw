<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>opcgw &mdash; Commands</title>
<link rel="stylesheet" href="/dashboard.css">
<style>
  /* Story 9-6 minimal-footprint overrides on top of dashboard.css. */
  .crud-form { display: grid; gap: 0.5rem; max-width: 600px; margin: 1rem 0; }
  .crud-form label { font-weight: bold; }
  .crud-form input, .crud-form select { padding: 0.4rem; font-size: 1rem; }
  .crud-form button { padding: 0.5rem; cursor: pointer; }
  .application-section { border: 1px solid #ccc; padding: 0.8rem; margin: 1rem 0; }
  .application-section h2 { margin-top: 0; }
  .device-section { border: 1px solid #ddd; padding: 0.6rem; margin: 0.6rem 0; background: #fafafa; }
  .device-section h3 { margin-top: 0; }
  table.commands { width: 100%; border-collapse: collapse; margin-bottom: 0.8rem; }
  table.commands th, table.commands td {
    padding: 0.5rem; border-bottom: 1px solid #ccc; text-align: left;
  }
  .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .btn-edit, .btn-delete { padding: 0.3rem 0.6rem; cursor: pointer; }
  .btn-delete { color: #fff; background: #c0392b; border: none; }
  .btn-edit { background: #2980b9; color: #fff; border: none; }
  .btn-add { background: #27ae60; color: #fff; border: none; padding: 0.3rem 0.6rem; cursor: pointer; }
  .modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; z-index: 100;
    overflow-y: auto;
  }
  .modal[open] { display: flex; }
  .modal-content {
    background: #fff; padding: 1rem; margin: auto;
    max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;
  }
  .error-banner { color: #c0392b; padding: 0.5rem; }
  @media (max-width: 600px) {
    table.commands, table.commands thead, table.commands tbody,
    table.commands tr, table.commands th, table.commands td {
      display: block;
    }
    table.commands tr { margin-bottom: 0.8rem; border: 1px solid #ddd; padding: 0.4rem; }
    .actions { flex-direction: column; }
  }
</style>
</head>
<body>
<header>
  <h1>opcgw &mdash; Commands</h1>
  <nav><a href="/index.html">Dashboard</a> | <a href="/applications.html">Applications</a> | <a href="/devices-config.html">Devices configuration</a> | <a href="/metrics.html">Live Metrics</a> | <strong>Commands</strong></nav>
</header>

<main>
  <div id="list-error" class="error-banner" hidden></div>
  <div id="applications-container">
    <p class="loading">Loading applications&hellip;</p>
  </div>
</main>

<!-- Edit-command modal (populated dynamically). -->
<dialog id="edit-modal" class="modal">
  <div class="modal-content">
    <h2 id="edit-modal-title">Edit command</h2>
    <form id="edit-form" class="crud-form">
      <input type="hidden" id="edit-application-id">
      <input type="hidden" id="edit-device-id">
      <input type="hidden" id="edit-command-id">
      <p><strong>command_id</strong> (immutable): <span id="edit-command-id-display"></span></p>
      <label for="edit-command-name">Command name</label>
      <input id="edit-command-name" name="command_name" type="text" required>
      <label for="edit-command-port">Command port (LoRaWAN f_port, 1&ndash;223)</label>
      <input id="edit-command-port" name="command_port" type="number" min="1" max="223" required>
      <label><input type="checkbox" id="edit-command-confirmed" name="command_confirmed"> Confirmed downlink</label>
      <div id="edit-error" class="error-banner" hidden></div>
      <div class="actions">
        <button type="submit">Save changes</button>
        <button type="button" id="edit-cancel">Cancel</button>
      </div>
    </form>
  </div>
</dialog>

<script src="/commands.js"></script>
</body>
</html>
