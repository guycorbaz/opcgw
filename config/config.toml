# ============================================================================
# opcgw — minimal default configuration template
#
# This file ships with placeholder credentials only. The gateway refuses to
# start with the placeholder values still in place, so you MUST inject real
# secrets via environment variables before first run.
#
# Required environment variables (see docs/security.md for the full recipe):
#   OPCGW_CHIRPSTACK__API_TOKEN   — overrides [chirpstack].api_token
#   OPCGW_OPCUA__USER_PASSWORD    — overrides [opcua].user_password
#
# Quick start:
#   1. Copy `.env.example` to `.env` and fill in real secret values.
#   2. Optionally tailor the `[[application]]` block(s) below to your
#      ChirpStack deployment, or copy `config/config.example.toml` for a
#      multi-application real-world reference.
#   3. Run the gateway (locally with `cargo run`, or via `docker compose up`
#      which auto-loads `.env`).
#
# See docs/security.md for the env-var convention, Docker / Kubernetes
# recipes, and anti-patterns to avoid.
# ============================================================================

[global]
debug = true


# Logging configuration (Story 6-1, level extended in Story 6-2)
#
# All values here may be overridden via environment variables:
#   OPCGW_LOG_DIR        — quick override for `dir` (read directly in main)
#   OPCGW_LOG_LEVEL      — quick override for `level` (read directly in main)
#   OPCGW_LOGGING__DIR   — figment-style override for `[logging].dir`
#   OPCGW_LOGGING__LEVEL — figment-style override for `[logging].level`
#
#[logging]
#dir = "/var/log/opcgw"
#level = "info"


[chirpstack]

# ChirpStack server address — replace with your ChirpStack v4 instance.
# Format: http://hostname:port  or  https://hostname:port
server_address = "http://127.0.0.1:8080"

# API token for ChirpStack authentication.
# Placeholder — the gateway refuses to start with this value. Set the real
# secret via the `OPCGW_CHIRPSTACK__API_TOKEN` env var.
api_token = "REPLACE_ME_WITH_OPCGW_CHIRPSTACK__API_TOKEN_ENV_VAR"

# Tenant UUID. Placeholder — replace with your ChirpStack tenant UUID
# (or override via `OPCGW_CHIRPSTACK__TENANT_ID`). Calls will be rejected by
# ChirpStack until a real UUID is supplied.
tenant_id = "00000000-0000-0000-0000-000000000000"

# Frequency to poll ChirpStack server, in seconds.
polling_frequency = 10
# Maximum number of connection retries when ChirpStack is unreachable.
retry = 10
# Delay (seconds) between successive retries.
delay = 10
# Page size for pagination in list API calls (Story 4-3). Range: 1-1000.
list_page_size = 100


# OPC UA server parameters
#
# At the time being, logging to the server is simple. It supports only
# - null endpoint without security
# - Basic256 without encryption
# - Basic256 with encryption
# - one user with password
[opcua]
application_name = "Chirpstack OPC UA Gateway"
application_uri = "urn:chirpstack:opcua:gateway"
product_uri = "urn:chirpstack:opcua:gateway"
diagnostics_enabled = true
#hello_timeout = 10
#host_ip_address = "localhost"
#host_port = 9090
# OPC UA self-signed-keypair generation (Story 7-2, AC#6).
#
# Production: false. Provision your keypair manually under pki/own/cert.der
# and pki/private/private.pem (file mode 0o600, directory mode 0o700).
# See docs/security.md.
#
# Development override: set this to `true` to have async-opcua auto-generate
# a self-signed keypair on first run. Only use in development; release
# builds with this set to `true` emit a startup warning.
create_sample_keypair = false
certificate_path = "own/cert.der"
private_key_path = "private/private.pem"
trust_client_cert = true
check_cert_time = true
pki_dir = "./pki"
user_name = "opcua-user"
# OPC UA user password.
# Placeholder — the gateway refuses to start with this value. Set the real
# secret via the `OPCGW_OPCUA__USER_PASSWORD` env var.
user_password = "REPLACE_ME_WITH_OPCGW_OPCUA__USER_PASSWORD_ENV_VAR"
# Staleness threshold in seconds for metric status codes (Story 5-2).
# Range: 1-86400. Default: 2x polling_frequency.
stale_threshold_seconds = 120


###########################################################
# Applications
#
# Define one or more `[[application]]` blocks below. Each application can
# contain multiple devices, and each device can have multiple read metrics
# and/or commands. The hierarchy Application → Device → Metric is reproduced
# in the OPC UA address space.
#
# The block below is a minimal illustrative example. For a multi-application
# real-world reference (the historical Arrosage / Bâtiments / Cultures /
# Meteo deployment), see `config/config.example.toml`.
###########################################################

[[application]]
application_id = "00000000-0000-0000-0000-000000000001"
application_name = "Example"

    [[application.device]]
    device_name = "ExampleSensor"
    # Synthesized illustrative DevEUI — replace with the real EUI of your device.
    device_id = "0000000000000001"

        [[application.device.read_metric]]
        metric_name = "Temperature"
        chirpstack_metric_name = "temperature"
        metric_type = "Float"
        metric_unit = "C"


# Command Delivery Status Configuration
#
# Configures polling intervals, timeout behavior, and retention for command
# status tracking. Commands transition through states: Pending -> Sent -> Confirmed (or Failed).
[command_delivery]
status_poll_interval_secs = 5
confirmation_timeout_secs = 60
timeout_check_interval_secs = 10
history_retention_days = 7
