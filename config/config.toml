# ============================================================================
# opcgw — bootstrap configuration seed
#
# As of v2.1.0, opcgw is configured from the web UI and stores all
# configuration in SQLite (the gateway database under ./data). This file is an
# OPTIONAL bootstrap seed: it is read ONCE on first start to populate an empty
# database, then never read or written again. To change configuration after the
# first boot, use the web UI — editing this file has no effect on a running
# gateway.
#
# Configuration precedence: environment variable > SQLite > this file > default.
#
# Secrets are NOT stored here. The gateway refuses to start while the
# placeholder credential values below are still in place; inject the real
# secrets via environment variables (or via the web setup wizard, which writes
# them to config/secrets.toml with file mode 0600):
#   OPCGW_CHIRPSTACK__API_TOKEN   — ChirpStack API token
#   OPCGW_OPCUA__USER_PASSWORD    — OPC UA user password
#
# Quick start (web-first):
#   1. Copy `.env.example` to `.env` and set the two secret values.
#   2. Run the gateway (`cargo run`, or `docker compose up` which auto-loads
#      `.env`). The web UI is enabled by default on port 8080.
#   3. Open http://localhost:8080 — on first run the gateway serves a setup
#      wizard. Enter your ChirpStack connection and OPC UA settings, then use
#      the application/device pickers to map metrics from your ChirpStack
#      inventory. No hand-editing of this file is required.
#
# The [[application]] block below is an optional illustrative seed; see
# `config/config.example.toml` for a multi-application reference. You can
# instead leave it out entirely and add everything through the web UI pickers.
#
# See docs/security.md for the env-var convention, Docker / Kubernetes
# recipes, and anti-patterns to avoid.
# ============================================================================

[global]
debug = true


# Logging configuration (Story 6-1, level extended in Story 6-2)
#
# All values here may be overridden via environment variables:
#   OPCGW_LOG_DIR        — quick override for `dir` (read directly in main)
#   OPCGW_LOG_LEVEL      — quick override for `level` (read directly in main)
#   OPCGW_LOGGING__DIR   — figment-style override for `[logging].dir`
#   OPCGW_LOGGING__LEVEL — figment-style override for `[logging].level`
#
#[logging]
#dir = "/var/log/opcgw"
#level = "info"


[chirpstack]

# ChirpStack server address — replace with your ChirpStack v4 instance.
# Format: http://hostname:port  or  https://hostname:port
server_address = "http://127.0.0.1:8080"

# API token for ChirpStack authentication.
# Placeholder — the gateway refuses to start with this value. Set the real
# secret via the `OPCGW_CHIRPSTACK__API_TOKEN` env var.
api_token = "REPLACE_ME_WITH_OPCGW_CHIRPSTACK__API_TOKEN_ENV_VAR"

# Tenant UUID. Placeholder — replace with your ChirpStack tenant UUID
# (or override via `OPCGW_CHIRPSTACK__TENANT_ID`). Calls will be rejected by
# ChirpStack until a real UUID is supplied.
tenant_id = "00000000-0000-0000-0000-000000000000"

# Frequency to poll ChirpStack server, in seconds.
polling_frequency = 10
# Number of recovery probe attempts when ChirpStack is unreachable.
# Note: this is an attempt count, not a retry count — `retry = 1` means one
# probe before giving up (zero retries after the original failure).
# AC#4 / NFR17: shipped defaults must satisfy `retry × delay ≤ 30s` so the
# auto-recovery loop stays within the 30s SLA. Operators tuning these
# knobs should preserve that invariant.
retry = 30
# Delay (seconds) between successive recovery probes.
delay = 1
# Page size for pagination in list API calls (Story 4-3). Range: 1-1000.
list_page_size = 100


# OPC UA server parameters
#
# At the time being, logging to the server is simple. It supports only
# - null endpoint without security
# - Basic256 without encryption
# - Basic256 with encryption
# - one user with password
[opcua]
application_name = "Chirpstack OPC UA Gateway"
application_uri = "urn:chirpstack:opcua:gateway"
product_uri = "urn:chirpstack:opcua:gateway"
diagnostics_enabled = true
#hello_timeout = 10
#host_ip_address = "localhost"
#host_port = 9090
# OPC UA self-signed-keypair generation.
#
# Production: false. Provision your keypair manually under pki/own/cert.der
# and pki/private/private.pem (file mode 0o600, directory mode 0o700).
# See docs/security.md.
#
# Development override: set this to `true` to have async-opcua auto-generate
# a self-signed keypair on first run. Only use in development; release
# builds with this set to `true` emit a startup warning.
create_sample_keypair = false
certificate_path = "own/cert.der"
private_key_path = "private/private.pem"
trust_client_cert = true
check_cert_time = true
pki_dir = "./pki"
user_name = "opcua-user"
# OPC UA user password.
# Placeholder — the gateway refuses to start with this value. Set the real
# secret via the `OPCGW_OPCUA__USER_PASSWORD` env var.
user_password = "REPLACE_ME_WITH_OPCGW_OPCUA__USER_PASSWORD_ENV_VAR"
# Staleness threshold in seconds for metric status codes (Story 5-2).
# Range: 1-86400. Default: 2x polling_frequency.
stale_threshold_seconds = 120
# Maximum number of concurrent OPC UA client sessions. New connections
# beyond this limit are rejected with the OPC UA status code
# BadTooManySessions. Existing sessions are unaffected.
#
# Default: 10. Range: 1 to 4096.
# Override via env var: OPCGW_OPCUA__MAX_CONNECTIONS
#max_connections = 10

# OPC UA subscription / message-size limits (Story 8-2). Surface async-opcua's
# ServerBuilder limits as config knobs so operators can shape subscription /
# message-size load. All four values default to the async-opcua library
# defaults; uncomment only if a specific deployment scenario requires tuning.
#
# max_subscriptions_per_session — per-session cap on simultaneous
#   subscriptions. Library default 10. Range: 1-1000.
# max_monitored_items_per_sub — per-subscription cap on monitored items.
#   Library default 1000. Range: 1-100000.
# max_message_size — per-message byte ceiling (inbound + outbound).
#   Library default 327675 (= 65535 * 5). Range: 1-268435456 (256 MiB).
# max_chunk_count — per-message chunk count ceiling. Library default 5.
#   Range: 1-4096.
#
#max_subscriptions_per_session = 10
#max_monitored_items_per_sub = 1000
#max_message_size = 327675
#max_chunk_count = 5
#
# OPC UA HistoryRead per-call response cap (Story 8-3, FR22).
# Caps the number of HistoryData rows returned for one NodeId in a single
# HistoryRead call. SCADA clients that want more page via follow-up
# calls (manual paging — Story 8-3 does not implement OPC UA
# continuation points; see docs/security.md#historical-data-access).
# Default 10000 ≈ 28 hours of poll data at 10s polling.
# Range: 1-1000000.
#max_history_data_results_per_node = 10000
#
# Override via env var: OPCGW_OPCUA__<UPPERCASE_KEY>


# Embedded Axum web server. Enabled by default (see the active [web] section
# below) because the web UI is the primary configuration surface as of v2.1.0:
# the setup wizard, ChirpStack inventory pickers, drift view, and singleton-
# config editor all live here. Set `enabled = false` (or
# `OPCGW_WEB__ENABLED=false`) to disable it. The server serves the
# configuration UI behind HTTP Basic auth (credentials shared with `[opcua]` —
# `user_name` / `user_password`).
#
# HTTP-only; deploy a reverse proxy (nginx, Caddy, Traefik) for TLS
# termination if your environment requires it (GH #104).
# See docs/security.md "Web UI authentication" for the full recipe.
#
# port — listening port. Default 8080. Range 1024–65535 (privileged
#   ports rejected). Override via OPCGW_WEB__PORT.
# bind_address — IP to bind. Default "0.0.0.0" (all interfaces).
#   Override via OPCGW_WEB__BIND_ADDRESS.
# auth_realm — Basic-auth realm string. Default "opcgw". Reject empty
#   strings, strings containing `"`, or strings longer than 64 chars.
#   Override via OPCGW_WEB__AUTH_REALM.
# enabled — master switch. Default false. Override via
#   OPCGW_WEB__ENABLED=true.
# allowed_origins — Story 9-4 CSRF allow-list for state-changing
#   routes (POST/PUT/DELETE on /api/applications/*). Each entry must
#   parse as scheme://host[:port] (no path/query/fragment).
#   When omitted, defaults to vec!["http://<bind_address>:<port>"].
#   Hot-reload of this knob is restart-required (GH #113).
#
#[web]
#enabled = false
#port = 8080
#bind_address = "0.0.0.0"
#auth_realm = "opcgw"
#allowed_origins = ["http://gateway.local:8080"]

# Active [web] section. As of v2.1.0 the web UI is the primary way to configure
# the gateway, so it is enabled by default here on port 8080. enabled /
# bind_address / port are also controllable via env vars (OPCGW_WEB__ENABLED,
# OPCGW_WEB__BIND_ADDRESS, OPCGW_WEB__PORT) which take precedence over the values
# here. `allowed_origins` is set explicitly because the default
# ("http://<bind_address>:<port>") only matches one of the two URLs operators
# commonly browse to; without both entries the CSRF middleware rejects
# POST/PUT/DELETE when the browser uses localhost while bind_address is 127.0.0.1
# (or vice versa). Both entries use port 8080 to match the listening port.
[web]
enabled = true
port = 8080
allowed_origins = [
    "http://127.0.0.1:8080",
    "http://localhost:8080",
]


###########################################################
# Applications
#
# Define one or more `[[application]]` blocks below. Each application can
# contain multiple devices, and each device can have multiple read metrics
# and/or commands. The hierarchy Application → Device → Metric is reproduced
# in the OPC UA address space.
#
# The block below is a minimal illustrative example. For a multi-application
# real-world reference (the historical Arrosage / Bâtiments / Cultures /
# Meteo deployment), see `config/config.example.toml`.
###########################################################

[[application]]
application_id = "ae2012c2-75a1-407d-98ab-1520fb511edf"
application_name = "Example"

    [[application.device]]
    device_name = "WaterFlowSensor"
    device_id = "a84041b8a1867e20"

        [[application.device.read_metric]]
        metric_name = "WaterFlow"
        chirpstack_metric_name = "WaterFlowValue"
        metric_type = "Int"
        metric_unit = ""


# Command Delivery Status Configuration
#
# Configures polling intervals, timeout behavior, and retention for command
# status tracking. Commands transition through states: Pending -> Sent -> Confirmed (or Failed).
[command_delivery]
status_poll_interval_secs = 5
confirmation_timeout_secs = 60
timeout_check_interval_secs = 10
history_retention_days = 7
