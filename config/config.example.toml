# ============================================================================
# Reference example configuration with multiple applications
# (Arrosage, Bâtiments, Cultures, Meteo).
#
# Do NOT use as-is in production. To use:
#   1. Copy to `config/config.toml`:
#        cp config/config.example.toml config/config.toml
#   2. Replace the `api_token` and `user_password` values with the
#      `REPLACE_ME_WITH_*` placeholders that the gateway recognises and
#      refuses to start with.
#   3. Inject the real secrets via environment variables — see
#      `docs/security.md` for the full recipe.
#   4. Tailor the `[[application]]` list to your deployment.
#
# This example preserves the multi-application real-world shape that an
# operator's production configuration is likely to take. The shipped
# `config/config.toml` is a minimal one-application template instead, so
# the default file does not embed any specific deployment topology.
# ============================================================================

# Chirpstack server connection
[global]
debug = true


# Logging configuration (Story 6-1, level extended in Story 6-2)
#
# All values here may be overridden via environment variables:
#   OPCGW_LOG_DIR        — quick override for `dir` (read directly in main)
#   OPCGW_LOG_LEVEL      — quick override for `level` (read directly in main)
#   OPCGW_LOGGING__DIR   — figment-style override for `[logging].dir`
#   OPCGW_LOGGING__LEVEL — figment-style override for `[logging].level`
#
# `level` precedence (highest first): CLI `-d` count > OPCGW_LOG_LEVEL >
# OPCGW_LOGGING__LEVEL > [logging].level > "info" default.
#
# `level` controls only the global console (stderr) and the root file
# appender (`opc_ua_gw.log`). The per-module file appenders below capture
# at TRACE for their respective targets *independently* of this value:
#   - chirpstack.log → opcgw::chirpstack    (TRACE)
#   - opc_ua.log     → opcgw::opc_ua        (TRACE) + async_opcua (DEBUG)
#   - storage.log    → opcgw::storage       (TRACE)
#   - config.log     → opcgw::config        (TRACE)
# So even at `level = "error"` you still get full traces in the per-module
# files; `level` only changes what reaches the console and `opc_ua_gw.log`.
#
# Level semantics (AC#3 — pick the lowest level that surfaces what you need):
#   | Level | Use case                                                       | Volume (10 dev, 1 Hz) |
#   |-------|----------------------------------------------------------------|-----------------------|
#   | trace | Deepest debugging — every operation, every span entry          | very high             |
#   | debug | Production troubleshooting — key decisions, timings, IDs       | moderate              |
#   | info  | Normal operations — cycle starts/ends, state transitions       | low (default)         |
#   | warn  | Anomalies and retries that succeeded — early warning signal    | sparse                |
#   | error | Unrecoverable conditions only — silent if healthy              | silent (healthy)      |
#
#[logging]
# Directory where per-module daily-rolling log files are written.
# Default: "./log"
#dir = "/var/log/opcgw"
# Global default log level: trace, debug, info, warn, error.
#level = "info"


[chirpstack]

# Chirpstack erver address
#
# Example format
#   http://192.168.1.4:8080
#   http://xx.yy.com:8080
#
server_address = "http://192.168.1.12:8080"
# API token defined on the chirpstack server.
# In production, set OPCGW_CHIRPSTACK__API_TOKEN env var instead — see docs/security.md.
api_token = "REPLACE_ME_WITH_OPCGW_CHIRPSTACK__API_TOKEN_ENV_VAR"
# Tenant Id that will be used
tenant_id = "00000000-0000-0000-0000-000000000000"
# Frequency to poll ChirpStack server in seconds
polling_frequency = 10
# Amount of connection retry when Chirpstack server is down
retry = 10
# Delay in sec between two retry
delay = 10
# Page size for pagination in list API calls (Story 4-3)
# Default: 100 (valid range: 1-1000)
list_page_size = 100


# OPC UA parameters
#
# At the time being, logging to the server is simple. It supports only
# - null endpoint without security
# - Basic256 without encryption
# - Basic256 with encryption
# - one user with password
#
[opcua]
# OPC UA application name
# This field is mandatory
application_name = "Chirpstack OPC UA Gateway"
# The globally unique identifier for the application instance
# This field is mandatory
application_uri = "urn:chirpstack:opcua:gateway"
# The globally unique identifier for the product.
# This field is mandatory
product_uri = "urn:chirpstack:opcua:gateway"
# Enable or disable logging of upc ua server diagnostic information
diagnostics_enabled = true
# TCP hello time out in s.
# This field is optional: default value is 5s
#hello_timeout = 10
# IP address to bind the server to
# This field is optional. Default, first interface IP address
#host_ip_address = "localhost"
# IP port for the server
# This field is optional. Default value is 4840
#host_port = 9090
# OPC UA self-signed-keypair generation (Story 7-2, AC#6).
#
# Production: false. Provision your keypair manually under pki/own/cert.der
# and pki/private/private.pem (file mode 0o600, directory mode 0o700).
# See docs/security.md.
#
# Development override: set this to `true` to have async-opcua auto-generate
# a self-signed keypair on first run. Only use in development; release
# builds with this set to `true` emit a startup warning.
create_sample_keypair = false
# Path of the certificate below pki_dir
certificate_path = "own/cert.der"
 # Path of the private key below pki_dir
private_key_path = "private/private.pem"
# Activate or deactivate trusting client certificate
trust_client_cert = true
# Activate or deactivate check of certificate validity
check_cert_time = true
# Kea and certificate folder
pki_dir = "./pki"
# Default user name
user_name = "opcua-user"
# Default user password.
# In production, set OPCGW_OPCUA__USER_PASSWORD env var instead — see docs/security.md.
user_password = "REPLACE_ME_WITH_OPCGW_OPCUA__USER_PASSWORD_ENV_VAR"
# Staleness threshold in seconds for metric status codes (Story 5-2)
# Metrics older than this threshold return Uncertain status in OPC UA (outside threshold but <24h)
# Metrics older than 24 hours return Bad status in OPC UA
# Default: 120 seconds (2x polling frequency at 10s polling interval)
# Valid range: 1-86400 seconds
# Can override with OPCGW_OPC_UA_STALE_THRESHOLD_SECONDS environment variable
stale_threshold_seconds = 120


###########################################################
# Applications
# application are listed below. There are no limits on the
# application number
# Eadch applicatgion can slso have an unlimited amount
# of device, and each device can have an unlimited amount
# of metrics.
# The hierarchy Application -> Device -> Metric is
# reproduced in the opc ua address space.
#
# Example of configuration
#
# [[Aplication]]
# application_name = "Application Name" # name displayed in opc ua
# application_is = "application_is" # Chirpstack application id
#
# [[application.device]]
# device_name = "Device Name" # name displayed in opc ua
# device_id = "device_id" # Chirpstack device id
#
# [[application.device.metric]]
# metric_name = "metric_name" # name displayed in opc ua
# chirpstack_metric_name = "chirpstack_name" # metric name in chirpstack
# metric_type = "Float" # Type of metric: either Bool, Int, Float, String
# metric_unit = "W" # the optional metric unit
#
# All fields are mandatory, except the metric unit
# There must be at least one application
# An application must have at least one device
# A device must have at least one metric


###########################################################
# Arrosage
###########################################################
[[application]]
application_id = "00000000-0000-0000-0000-000000000001"
application_name = "Arrosage"

    [[application.device]]
    device_name = "Niveau_citerne"
    device_id = "0000000000000001"

        [[application.device.read_metric]]
        metric_name ="Niveau_cit"
        chirpstack_metric_name = "Water_deep_cm"
        metric_type = "Float"

        [[application.device.read_metric]]
        metric_name ="Batterie_cit"
        chirpstack_metric_name = "Bat_V"
        metric_type = "Float"

        [[application.device.read_metric]]
        metric_name ="IDC_intput_mA"
        chirpstack_metric_name = "IDC_intput_mA"
        metric_type = "Float"

        [[application.device.read_metric]]
        metric_name ="VDC_intput_V"
        chirpstack_metric_name = "VDC_intput_V"
        metric_type = "Float"


    [[application.device]]
    device_name = "Vanne01"
    # DevEUI
    device_id = "0000000000000002"

        [[application.device.read_metric]]
        # This value must be unique
        metric_name ="Status_v01"
        chirpstack_metric_name = "valveStatusCode"
        metric_type = "Int"

        [[application.device.read_metric]]
        # This value must be unique
        metric_name ="BatteryLevel_v01"
        chirpstack_metric_name = "batteryLevel"
        metric_type = "Int"

        [[application.device.command]]
        # This value must be unique
        command_name = "Open_close_valve01"
        command_id = 1
        command_confirmed = true
        command_port = 10


    [[application.device]]
    device_name = "Vanne02"
    device_id = "0000000000000003"

        [[application.device.read_metric]]
        # This value must be unique
        metric_name ="Status_v02"
        chirpstack_metric_name = "valveStatusCode"
        metric_type = "Int"
        [[application.device.read_metric]]
        # This value must be unique
        metric_name ="BatteryLevel_v02"
        chirpstack_metric_name = "batteryLevel"
        metric_type = "Int"

        [[application.device.command]]
        command_name = "Open_close_valve02"
        command_id = 2
        command_confirmed = true
        command_port = 10


    [[application.device]]
    device_name = "Vanne03"
    device_id = "0000000000000004"

        [[application.device.read_metric]]
        # This value must be unique
        metric_name ="Status_v02"
        chirpstack_metric_name = "valveStatusCode"
        metric_type = "Float"

        [[application.device.read_metric]]
        # This value must be unique
        metric_name ="BatteryLevel_v03"
        chirpstack_metric_name = "batteryLevel"
        metric_type = "Int"

        [[application.device.command]]
        command_name = "Open_close_valve03"
