<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <title>opcgw - ChirpStack to OPC UA gateway</title>
  <desc>opcgw logo with wordmark and baseline</desc>

  <!-- ===== Mark hexagonal ===== -->
  <g transform="translate(10, 7)">
    <polygon points="43,0 82.56,22.85 82.56,68.55 43,91.4 3.44,68.55 3.44,22.85"
      fill="#1A3F5C" stroke="#CE7B3C" stroke-width="2.7" stroke-linejoin="round"/>
    <circle cx="30.1" cy="45.7" r="10.75" fill="none" stroke="#CE7B3C" stroke-width="2.7"/>
    <circle cx="55.9" cy="45.7" r="8.6" fill="none" stroke="#FFFFFF" stroke-width="2.7"/>
    <path d="M 64.5 45.7 L 64.5 60.75 L 57 60.75" fill="none" stroke="#FFFFFF" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== Séparateur vertical ===== -->
  <line x1="115" y1="25" x2="115" y2="75" stroke="#DDDDDD" stroke-width="1"/>

  <!-- ===== Wordmark ===== -->
  <text x="135" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="500" fill="#1A3F5C" letter-spacing="-0.5">opc<tspan fill="#CE7B3C">gw</tspan></text>

  <!-- ===== Baseline ===== -->
  <text x="135" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="400" fill="#888888" letter-spacing="1.5">CHIRPSTACK  ·  OPC UA  ·  BRIDGE</text>
</svg>
