# Docker compose file for chirpstack opcua gateway.
#
# The gateway image runs as non-root user `opcgw` (UID 10001). Before first
# start, chown the host-side bind-mount targets to that user so the gateway
# can read its PKI / write its log / persist its SQLite DB:
#
#   sudo chown -R 10001:10001 ./log ./config ./pki ./data
#   sudo chmod 700 ./pki/private
#   sudo chmod 600 ./pki/private/*    # OPC UA private-key permissions
#
# Pull the published v2.3 image instead of building locally by either:
#   * `docker compose pull` (uses the `image:` declared below), or
#   * `docker pull docker.io/gcorbaz/opcgw:2.3 && docker tag docker.io/gcorbaz/opcgw:2.3 opcgw`
# For local-dev builds against the working tree, run `docker build -t opcgw .`
# first and Compose will pick up the local tag.

services:
  opcgw:
    container_name: opcgw
    image: docker.io/gcorbaz/opcgw:2.3
    restart: always
    ports:
      # OPC UA. Uses OPCGW_OPCUA__HOST_PORT from `.env` when set, else 4840.
      - "${OPCGW_OPCUA__HOST_PORT:-4840}:${OPCGW_OPCUA__HOST_PORT:-4840}"
      # Web UI (setup wizard + configuration), enabled via OPCGW_WEB__ENABLED
      # in `.env`. Uses OPCGW_WEB__PORT when set, else 8080. Browse
      # http://localhost:<port> to reach the first-run setup wizard.
      - "${OPCGW_WEB__PORT:-8080}:${OPCGW_WEB__PORT:-8080}"
    # All gateway environment variables — secret credentials and any optional
    # OPCGW_* overrides — live in a single `.env` file in this directory.
    # Copy `.env.example` to `.env`, fill in the required values, then
    # `chmod 600 .env`. Keeping everything in one file avoids splitting
    # configuration between `.env` and this compose file. See the user
    # manual's environment-variable appendix for the full list.
    env_file:
      - .env
    # Liveness probe: confirm the OPC UA listener is accepting TCP. The runtime
    # image has no curl/wget, so this uses bash's /dev/tcp. If you change the
    # OPC UA port via OPCGW_OPCUA__HOST_PORT, this probe follows it.
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/${OPCGW_OPCUA__HOST_PORT:-4840}' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./log:/usr/local/bin/log
      - ./config:/usr/local/bin/config
      - ./pki:/usr/local/bin/pki
      # SQLite database directory. MUST be bind-mounted (or replaced with a
      # named volume) so persisted metrics + history survive container restart.
      # Without this mount, the SQLite file lives in the ephemeral container
      # layer and is destroyed on every `docker compose down`.
      - ./data:/usr/local/bin/data
